<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0c0906"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1e12"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <linearGradient id="k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a868"/>
      <stop offset="100%" stop-color="#c06840"/>
    </linearGradient>
    <clipPath id="bounds">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- warm circle — bottom right, clipped to icon bounds -->
  <circle cx="440" cy="440" r="220" fill="url(#panel)" clip-path="url(#bounds)"/>

  <!-- K mark -->
  <rect x="130" y="110" width="64" height="292" rx="10" fill="url(#k)"/>
  <polygon points="194,256 194,182 350,110 396,110 396,154 258,256" fill="url(#k)"/>
  <polygon points="194,256 258,256 396,378 396,402 350,402 194,330" fill="url(#k)"/>
</svg>
